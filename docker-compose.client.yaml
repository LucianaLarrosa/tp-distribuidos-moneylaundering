name: moneylaundering-client

services:

  rabbitmq:
    build: ./src/rabbitmq
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 10s

  # ── Gateway: acepta TCP del client, publica raw a rabbit y recibe resultados ─
  gateway_1:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    container_name: gateway_1
    depends_on:
      rabbitmq:
        condition: service_healthy
      transactions_field_mapper:
        condition: service_started
      accounts_field_mapper:
        condition: service_started
    ports:
      - "5000:5000"
    environment:
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "5000"
      POOL_SIZE: "4"
      RABBITMQ_HOST: rabbitmq
      RAW_DATA_EXCHANGE: raw_data
      TRANSACTION_ROUTING_KEY: "transaction"
      ACCOUNT_ROUTING_KEY: "account"
      QUERY_RESULTS_EXCHANGE: query_results

  # ── Client: lee los CSV y los envía por TCP al gateway ──────────────────────
  client_1:
    build:
      context: .
      dockerfile: src/client/Dockerfile
    container_name: client_1
    depends_on:
      gateway_1:
        condition: service_started
    volumes:
      - ${DATASET_PATH:-./entornito/data}:/data:ro
      - ./output:/output
    environment:
      SERVER_HOST: gateway_1
      SERVER_PORT: "5000"
      INPUT_CSV_TRANSACTIONS: /data/HI-Small_Trans.csv
      INPUT_CSV_ACCOUNTS: /data/HI-Small_accounts.csv
      BATCH_SIZE: "1000"
      EXPECTED_QUERY_IDS: "2,5"
      OUTPUT_DIR: /output

  # ── transactions_field_mapper: parsea raw CSV a Transaction y separa USD ────
  transactions_field_mapper:
    build:
      context: .
      dockerfile: src/workers/transactions_field_mapper/Dockerfile
    container_name: transactions_field_mapper
    depends_on:
      rabbitmq:
        condition: service_healthy
      date_filter:
        condition: service_started
      bank_max_aggregator_0:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      RAW_DATA_EXCHANGE: raw_data
      INPUT_ROUTING_KEY: "transaction"
      OUTPUT_EXCHANGE: filtered_transactions
      OUTPUT_ROUTING_KEY_USD: "usd"
      OUTPUT_ROUTING_KEY_NOUSD: "nousd"
      OUTPUT_ROUTING_KEY_EOF: "eof"
      USD_CURRENCY: "US Dollar"

  # ── date_filter: filtra por fecha y separa por currency+periodo ─────────────
  date_filter:
    build:
      context: .
      dockerfile: src/workers/date_filter/Dockerfile
    container_name: date_filter
    depends_on:
      rabbitmq:
        condition: service_healthy
      payment_format_filter:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_EXCHANGE: filtered_transactions
      INPUT_ROUTING_KEY: "#"
      OUTPUT_EXCHANGE: date_filter_output
      DATE_FORMAT: "%Y/%m/%d %H:%M"
      DATE_FROM_1: "2022/09/01 00:00"
      DATE_TO_1: "2022/09/05 23:59"
      DATE_FROM_2: "2022/09/06 00:00"
      DATE_TO_2: "2022/09/15 23:59"
      USD_CURRENCY: "US Dollar"
      OUTPUT_ROUTING_KEY_USD: "usd"
      OUTPUT_ROUTING_KEY_NO_USD: "nousd"
      OUTPUT_ROUTING_KEY_PERIOD_1: "period1"
      OUTPUT_ROUTING_KEY_PERIOD_2: "period2"
      OUTPUT_ROUTING_KEY_EOF: "eof"

  # ── payment_format_filter: filtra por formato y empuja a queue ──────────────
  payment_format_filter:
    build:
      context: .
      dockerfile: src/workers/payment_format_filter/Dockerfile
    container_name: payment_format_filter
    depends_on:
      rabbitmq:
        condition: service_healthy
      currency_mapper:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_EXCHANGE: date_filter_output
      INPUT_ROUTING_KEY: "*.period1,eof"
      OUTPUT_QUEUE: currency_mapper_input
      VALID_PAYMENT_FORMATS: "Wire,ACH"

  # ── currency_mapper: convierte montos no-USD a USD ──────────────────────────
  currency_mapper:
    build:
      context: .
      dockerfile: src/workers/currency_mapper/Dockerfile
    container_name: currency_mapper
    depends_on:
      rabbitmq:
        condition: service_healthy
      low_amount_aggregator_0:
        condition: service_started
      low_amount_aggregator_1:
        condition: service_started
      low_amount_aggregator_2:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_QUEUE: currency_mapper_input
      OUTPUT_QUEUE: currency_mapper_output
      TARGET_CURRENCY: "US Dollar"
      FRANKFURTER_URL: "https://api.frankfurter.dev/v2/rates?from=2022-09-01&to=2022-09-05&base=USD"
      FRANKFURTER_TIMEOUT_SECONDS: "10"
      RATES_DATE_FIELD: "date"
      RATES_QUOTE_FIELD: "quote"
      RATES_RATE_FIELD: "rate"
      RATES_DATE_FORMAT: "%Y-%m-%d"
      TRANSACTION_DATE_FORMAT: "%Y/%m/%d %H:%M"

  # ── low_amount_aggregator x3: ring de coordinación ──────────────────────────
  low_amount_aggregator_0:
    build:
      context: .
      dockerfile: src/workers/low_amount_aggregator/Dockerfile
    container_name: low_amount_aggregator_0
    depends_on:
      rabbitmq:
        condition: service_healthy
      low_amount_reducer:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_QUEUE: currency_mapper_output
      OUTPUT_QUEUE: low_amount_aggregator_output
      CONTROL_EXCHANGE: low_amount_aggregator_control
      NODE_PREFIX: "node."
      NODE_ID: "0"
      RING_SIZE: "3"
      MAX_AMOUNT: "1.0"

  low_amount_aggregator_1:
    build:
      context: .
      dockerfile: src/workers/low_amount_aggregator/Dockerfile
    container_name: low_amount_aggregator_1
    depends_on:
      rabbitmq:
        condition: service_healthy
      low_amount_reducer:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_QUEUE: currency_mapper_output
      OUTPUT_QUEUE: low_amount_aggregator_output
      CONTROL_EXCHANGE: low_amount_aggregator_control
      NODE_PREFIX: "node."
      NODE_ID: "1"
      RING_SIZE: "3"
      MAX_AMOUNT: "1.0"

  low_amount_aggregator_2:
    build:
      context: .
      dockerfile: src/workers/low_amount_aggregator/Dockerfile
    container_name: low_amount_aggregator_2
    depends_on:
      rabbitmq:
        condition: service_healthy
      low_amount_reducer:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_QUEUE: currency_mapper_output
      OUTPUT_QUEUE: low_amount_aggregator_output
      CONTROL_EXCHANGE: low_amount_aggregator_control
      NODE_PREFIX: "node."
      NODE_ID: "2"
      RING_SIZE: "3"
      MAX_AMOUNT: "1.0"

  # ── low_amount_reducer: suma los conteos y los manda al gateway por uuid ────
  low_amount_reducer:
    build:
      context: .
      dockerfile: src/workers/low_amount_reducer/Dockerfile
    container_name: low_amount_reducer
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_QUEUE: low_amount_aggregator_output
      OUTPUT_EXCHANGE: query_results
      CONTROL_EXCHANGE: low_amount_reducer_control
      NODE_PREFIX: "node."
      NODE_ID: "0"
      RING_SIZE: "1"

  # ─────────────────────────── Q2 pipeline ───────────────────────────────────

  # ── accounts_field_mapper: parsea las accounts y broadcasea el catálogo ─────
  accounts_field_mapper:
    build:
      context: .
      dockerfile: src/workers/accounts_field_mapper/Dockerfile
    container_name: accounts_field_mapper
    depends_on:
      rabbitmq:
        condition: service_healthy
      bank_mapper_0:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      RAW_DATA_EXCHANGE: raw_data
      INPUT_ROUTING_KEY: "account"
      OUTPUT_EXCHANGE: bank_catalog

  # ── bank_max_aggregator x3: ring que computa max local por banco ────────────
  bank_max_aggregator_0:
    build:
      context: .
      dockerfile: src/workers/bank_max_aggregator/Dockerfile
    container_name: bank_max_aggregator_0
    depends_on:
      rabbitmq:
        condition: service_healthy
      bank_max_reducer_0:
        condition: service_started
      bank_max_reducer_1:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_EXCHANGE: filtered_transactions
      INPUT_BINDING_PATTERNS: "usd,eof"
      INPUT_QUEUE: bank_max_input
      OUTPUT_EXCHANGE: bank_max_output
      CONTROL_EXCHANGE: bank_max_aggregator_control
      NODE_PREFIX: "node."
      NODE_ID: "0"
      RING_SIZE: "3"
      BATCH_SIZE: "5"
      NUM_SHARDS: "2"

  bank_max_aggregator_1:
    build:
      context: .
      dockerfile: src/workers/bank_max_aggregator/Dockerfile
    container_name: bank_max_aggregator_1
    depends_on:
      rabbitmq:
        condition: service_healthy
      bank_max_reducer_0:
        condition: service_started
      bank_max_reducer_1:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_EXCHANGE: filtered_transactions
      INPUT_BINDING_PATTERNS: "usd,eof"
      INPUT_QUEUE: bank_max_input
      OUTPUT_EXCHANGE: bank_max_output
      CONTROL_EXCHANGE: bank_max_aggregator_control
      NODE_PREFIX: "node."
      NODE_ID: "1"
      RING_SIZE: "3"
      BATCH_SIZE: "5"
      NUM_SHARDS: "2"

  bank_max_aggregator_2:
    build:
      context: .
      dockerfile: src/workers/bank_max_aggregator/Dockerfile
    container_name: bank_max_aggregator_2
    depends_on:
      rabbitmq:
        condition: service_healthy
      bank_max_reducer_0:
        condition: service_started
      bank_max_reducer_1:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_EXCHANGE: filtered_transactions
      INPUT_BINDING_PATTERNS: "usd,eof"
      INPUT_QUEUE: bank_max_input
      OUTPUT_EXCHANGE: bank_max_output
      CONTROL_EXCHANGE: bank_max_aggregator_control
      NODE_PREFIX: "node."
      NODE_ID: "2"
      RING_SIZE: "3"
      BATCH_SIZE: "5"
      NUM_SHARDS: "2"

  # ── bank_max_reducer x2 (uno por shard): max global por banco ───────────────
  bank_max_reducer_0:
    build:
      context: .
      dockerfile: src/workers/bank_max_reducer/Dockerfile
    container_name: bank_max_reducer_0
    depends_on:
      rabbitmq:
        condition: service_healthy
      bank_mapper_0:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_EXCHANGE: bank_max_output
      SHARD_ID: "0"
      OUTPUT_QUEUE: bank_max_results
      CONTROL_EXCHANGE: bank_max_reducer_control
      NODE_PREFIX: "node."
      NODE_ID: "0"
      RING_SIZE: "2"
      BATCH_SIZE: "20"

  bank_max_reducer_1:
    build:
      context: .
      dockerfile: src/workers/bank_max_reducer/Dockerfile
    container_name: bank_max_reducer_1
    depends_on:
      rabbitmq:
        condition: service_healthy
      bank_mapper_0:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_EXCHANGE: bank_max_output
      SHARD_ID: "1"
      OUTPUT_QUEUE: bank_max_results
      CONTROL_EXCHANGE: bank_max_reducer_control
      NODE_PREFIX: "node."
      NODE_ID: "1"
      RING_SIZE: "2"
      BATCH_SIZE: "20"

  # ── bank_mapper: joinea el max global con el catálogo y emite Q2_RESULT ─────
  bank_mapper_0:
    build:
      context: .
      dockerfile: src/workers/bank_mapper/Dockerfile
    container_name: bank_mapper_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      INPUT_QUEUE: bank_max_results
      OUTPUT_EXCHANGE: query_results
      BANKS_EXCHANGE: bank_catalog
      CONTROL_EXCHANGE: bank_mapper_control
      NODE_PREFIX: "node."
      NODE_ID: "0"
      RING_SIZE: "1"
