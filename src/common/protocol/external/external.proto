syntax = "proto3";

package external;


message RawTransaction {
  string raw = 1;
}

message RawAccount {
  string raw = 1;
}

message Q1Result {
  string from_bank    = 1;
  string from_account = 2;
  string to_bank      = 3;
  string to_account   = 4;
  double amount_paid  = 5;
}

message Q2Result {
  string bank_name    = 1;
  string from_account = 2;
  double amount_paid  = 3;
}

message Q3Result {
  string from_bank    = 1;
  string from_account = 2;
  double amount_paid  = 3;
}

message Q4Result {
  string bank    = 1;
  string account = 2;
}

message Q5Result {
  uint32 count = 1;
}

message TransactionBatch { repeated RawTransaction items = 1; }
message AccountBatch     { repeated RawAccount     items = 1; }

message Q1ResultBatch { repeated Q1Result items = 1; }
message Q2ResultBatch { repeated Q2Result items = 1; }
message Q3ResultBatch { repeated Q3Result items = 1; }
message Q4ResultBatch { repeated Q4Result items = 1; }
message Q5ResultBatch { repeated Q5Result items = 1; }

message EofTransactions {}
message EofAccounts {}
message Ack {}

message QueryResult {
  uint32 query_id = 1;
  oneof results {
    Q1ResultBatch q1 = 2;
    Q2ResultBatch q2 = 3;
    Q3ResultBatch q3 = 4;
    Q4ResultBatch q4 = 5;
    Q5ResultBatch q5 = 6;
  }
}

message QueryEnd {
  uint32 query_id = 1;
}

message Redirect {
  string host = 1;
  uint32 port = 2;
}

message Envelope {
  oneof payload {
    TransactionBatch transaction_batch = 1;
    AccountBatch     account_batch     = 2;
    EofTransactions  eof_transactions  = 3;
    EofAccounts      eof_accounts      = 4;
    QueryResult      query_result      = 5;
    QueryEnd         query_end         = 6;
    Redirect         redirect          = 7;
    Ack              ack               = 8;
  }
}
